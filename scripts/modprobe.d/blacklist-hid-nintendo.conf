# Blacklist hid_nintendo so the kernel doesn't bind it to the EasySMX KC-8236
# gamepad (and similar third-party controllers that spoof the Switch Pro
# VID:PID 057e:2009).
#
# Background: kernels >= 5.16 ship hid_nintendo. It claims any device
# reporting 057e:2009 and binds it as a Switch controller — wrong button
# mapping (A/B/X/Y swapped from Xbox), no /dev/input/js0, no force feedback.
# This was invisible on Pi 4 (its older kernel image lacked hid_nintendo);
# Pi 5 with kernel 6.x hits it on every boot.
#
# Without hid_nintendo to grab the device, hid-generic claims it briefly,
# the controller's firmware sees no real HID handler responding, and times
# out into Xbox 360 mode (re-enumerates as 2f24:016d, bound by `xpad`).
# Result: /dev/input/js0 appears, button mapping is correct, joy_node works.
#
# Tradeoff: a genuine Nintendo Switch Pro Controller would also be blocked.
# That's fine for the racecar — we never use real Switch controllers.
#
# Per-device blacklisting on this layer isn't possible (modprobe blacklist
# is module-wide). Per-device unbinding via udev was tried and fails because
# nintendo re-grabs the device immediately after each unbind.
blacklist hid_nintendo
